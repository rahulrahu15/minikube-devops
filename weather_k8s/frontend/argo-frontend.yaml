apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weather-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/rahulrahu15/minikube-devops.git'  # Replace with your repo
    targetRevision: main
    path: weather_project/frontend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
