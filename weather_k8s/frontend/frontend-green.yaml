apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-green
  labels:
    app: weather-frontend
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-frontend
      version: green
  template:
    metadata:
      labels:
        app: weather-frontend
        version: green
    spec:
      containers:
      - name: frontend
        image: rahul4475/weather-frontend:green  # DockerHub production-like image
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: weather-frontend
    version: green  # change this between blue/green to switch traffic
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: NodePort
