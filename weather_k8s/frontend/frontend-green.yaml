apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-green
  labels:
    app: weather-frontend
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-frontend
      version: green
  template:
    metadata:
      labels:
        app: weather-frontend
        version: green
    spec:
      containers:
      - name: frontend
        image: rahul4475/weather-frontend:green  # DockerHub production-like image
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"

