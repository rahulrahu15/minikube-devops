<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Stats Dashboard - GREEN</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #d4f5d4; /* light green background */
        }
        #banner {
            background-color: green;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div id="banner">🌤 GREEN Version - Weather Dashboard</div>

<h1>🌤 Weather Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>Temperature</h2>
        <p id="temp">-- °C</p>
    </div>

    <div class="card">
        <h2>Humidity</h2>
        <p id="humidity">-- %</p>
    </div>

    <div class="card">
        <h2>Wind Speed</h2>
        <p id="wind">-- m/s</p>
    </div>

</div>

<canvas id="weatherChart"></canvas>

<button onclick="getWeather()">Refresh Data</button>

<script src="script.js"></script>

</body>
</html>
