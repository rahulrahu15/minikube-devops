name: Build & Push Docker Images

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Build and push frontend Blue image
      run: |
        docker build -t rahul4475/weather-frontend:blue ./frontend
        docker push rahul4475/weather-frontend:blue

    - name: Build and push frontend Green image
      run: |
        docker build -t rahul4475/weather-frontend:green ./frontend
        docker push rahul4475/weather-frontend:green

    - name: Build and push backend image
      run: |
        docker build -t rahul4475/weather-backend:latest ./backend
        docker push rahul4475/weather-backend:latest

    - name: Optional - Trivy Scan frontend
      run: |
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.44.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.44.0_Linux-64bit.deb
        trivy image --exit-code 1 rahul4475/weather-frontend:green
