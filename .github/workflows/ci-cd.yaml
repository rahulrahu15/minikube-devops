name: Weather Project CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # ---------------- Frontend Blue ----------------
    - name: Build frontend-blue image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:blue ./frontend

    - name: Scan frontend-blue image with Trivy
      run: |
        sudo apt-get update && sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.42.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.42.0_Linux-64bit.deb
        trivy image --severity HIGH,CRITICAL ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:blue || echo "Trivy scan failed, continuing"

    - name: Push frontend-blue image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:blue

    # ---------------- Frontend Green ----------------
    - name: Build frontend-green image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:green ./frontend

    - name: Scan frontend-green image with Trivy
      run: trivy image --severity HIGH,CRITICAL ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:green || echo "Trivy scan failed, continuing"

    - name: Push frontend-green image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:green

    # ---------------- Backend ----------------
    - name: Build backend image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest ./backend

    - name: Scan backend image with Trivy
      run: trivy image --severity HIGH,CRITICAL ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest || echo "Trivy scan failed, continuing"

    - name: Push backend image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest
