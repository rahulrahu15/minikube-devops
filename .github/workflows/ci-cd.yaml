name: Weather Project CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------- Build Frontend Blue ----------------
      - name: Build frontend-blue image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:blue ./frontend

      - name: Push frontend-blue
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:blue

      # ---------------- Build Frontend Green ----------------
      - name: Build frontend-green image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:green ./frontend

      - name: Push frontend-green
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:green

      # ---------------- Build Backend ----------------
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest ./backend

      - name: Push backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:latest
